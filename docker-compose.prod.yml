# Spondic Production — Single EC2 (ARM64/Graviton)
# AI service runs natively via systemd (spondic-ai.service)
# Usage: docker compose -f docker-compose.prod.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: spondic
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-spondic_prod_2026}
      POSTGRES_DB: spondic
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spondic -d spondic"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.27.2
    restart: always
    ports:
      - "127.0.0.1:8081:8080"
      - "127.0.0.1:50051:50051"
    environment:
      QUERY_DEFAULTS_LIMIT: "25"
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      DEFAULT_VECTORIZER_MODULE: "none"
      CLUSTER_HOSTNAME: "node1"
      LIMIT_RESOURCES: "true"
      GOMAXPROCS: "1"
    volumes:
      - weaviate_data:/var/lib/weaviate
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/v1/.well-known/ready"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DATABASE_URL=postgres://spondic:${POSTGRES_PASSWORD:-spondic_prod_2026}@postgres:5432/spondic?sslmode=disable
      - AI_SERVICE_URL=http://host.docker.internal:8000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - ./api/.env.production
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  weaviate_data:
